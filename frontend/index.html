<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Trading System</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<style>
:root{

--bd:#1a1a26;--bd2:#252532;
--t0:#e8e8f0;--t1:#a8a8be;--t2:#68687e;--t3:#484860;
--green:#00e676;--green2:#00c853;--green-g:rgba(0,230,118,.12);--green-g2:rgba(0,230,118,.06);
--red:#ff5252;--red2:#d32f2f;--red-g:rgba(255,82,82,.12);
--cyan:#00e5ff;--cyan-g:rgba(0,229,255,.1);
--yellow:#ffd600;--yellow-g:rgba(255,214,0,.1);

*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg0);color:var(--t0);font-family:var(--font);overflow:hidden;height:100vh;font-size:12px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--t3)}

.app{display:flex;height:100vh}

/* SIDEBAR */
.sb{width:48px;background:var(--bg1);border-right:1px solid var(--bd);display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:2px;flex-shrink:0;z-index:10}
.sb-logo{font-size:9px;font-weight:800;color:var(--green);letter-spacing:1px;margin-bottom:12px;padding:6px 0}
.sb-btn{width:36px;height:36px;border:none;background:transparent;color:var(--t3);cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .12s;position:relative}
.sb-btn:hover{background:var(--bg3);color:var(--t1)}
.sb-btn.on{color:var(--green);background:var(--green-g)}
.sb-btn.on::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:2px;background:var(--green);border-radius:0 2px 2px 0}
.sb-sep{width:24px;height:1px;background:var(--bd);margin:8px 0}

/* MAIN */
.mn{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.top{height:36px;background:var(--bg1);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 12px;gap:10px;flex-shrink:0}
.top-t{font-weight:700;font-size:11px;color:var(--t0);text-transform:uppercase;letter-spacing:1.5px}
.top-sub{font-size:10px;color:var(--t3)}
.cnt{flex:1;overflow-y:auto;overflow-x:hidden}

/* CONTROLS */
.sel{background:var(--bg2);border:1px solid var(--bd);color:var(--t0);padding:4px 8px;border-radius:4px;font:inherit;font-size:11px;cursor:pointer;outline:none;appearance:none}
.sel:focus{border-color:var(--green)}
.sel option{background:var(--bg2)}
.btn{background:var(--bg3);border:1px solid var(--bd);color:var(--t1);padding:5px 12px;border-radius:4px;font:inherit;font-size:11px;cursor:pointer;transition:all .12s;font-weight:500;white-space:nowrap}
.btn:hover{background:var(--bg4);border-color:var(--bd2);color:var(--t0)}
.btn:active{transform:scale(.97)}
.btn-g{background:var(--green-g);border-color:rgba(0,230,118,.3);color:var(--green)}
.btn-g:hover{background:rgba(0,230,118,.2);border-color:var(--green)}
.btn-r{color:var(--red);border-color:rgba(255,82,82,.2)}
.btn-r:hover{background:var(--red-g);border-color:var(--red)}
.btn-sm{padding:3px 8px;font-size:10px}
.inp{background:var(--bg2);border:1px solid var(--bd);color:var(--t0);padding:6px 8px;border-radius:4px;font:inherit;font-size:11px;outline:none;width:100%}
.inp:focus{border-color:var(--green)}
.lbl{font-size:10px;color:var(--t3);margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* CARDS */
.card{background:var(--bg1);border:1px solid var(--bd);border-radius:6px;overflow:hidden}
.card-h{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;padding:10px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}

/* TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:6px 10px;font-weight:600;color:var(--t3);font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bd);background:var(--bg2);position:sticky;top:0;z-index:1}
.tbl td{padding:6px 10px;border-bottom:1px solid var(--bd);font-size:11px;color:var(--t1)}
.tbl tr:hover td{background:var(--bg2)}

/* BADGES */
.bg{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:.3px}
.bg-g{background:var(--green-g);color:var(--green)}
.bg-r{background:var(--red-g);color:var(--red)}
.bg-c{background:var(--cyan-g);color:var(--cyan)}
.bg-y{background:var(--yellow-g);color:var(--yellow)}

/* PROFIT/LOSS */
.pos{color:var(--green)}.neg{color:var(--red)}

/* LAYOUT UTILS */
.fx{display:flex}.fc{flex-direction:column}.fw{flex-wrap:wrap}
.ac{align-items:center}.jb{justify-content:space-between}.jc{justify-content:center}
.g1{gap:4px}.g2{gap:8px}.g3{gap:12px}.g4{gap:16px}
.f1{flex:1}.mn0{min-width:0}
.p2{padding:8px}.p3{padding:12px}.p4{padding:16px}
.mb2{margin-bottom:8px}.mb3{margin-bottom:12px}

/* EXPANDABLE LIST */
.exp{border:1px solid var(--bd);border-radius:6px;background:var(--bg1);overflow:hidden;margin-bottom:6px;transition:border-color .15s}
.exp:hover{border-color:var(--bd2)}
.exp-h{padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .1s;user-select:none}
.exp-h:hover{background:var(--bg2)}
.exp-arr{color:var(--t3);transition:transform .2s;font-size:10px;flex-shrink:0}
.exp-arr.open{transform:rotate(90deg)}
.exp-b{border-top:1px solid var(--bd);background:var(--bg2);overflow:hidden}

/* CHART */
.ch-wrap{border:1px solid var(--bd);border-radius:6px;overflow:hidden;background:var(--bg1)}

/* GRID */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}

/* STAT */
.stat{padding:10px 12px}
.stat-v{font-size:18px;font-weight:700;line-height:1.2}
.stat-l{font-size:9px;color:var(--t3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

/* TOAST */
.toast{position:fixed;bottom:16px;right:16px;background:var(--bg3);border:1px solid var(--bd2);padding:8px 14px;border-radius:6px;font-size:11px;z-index:999;animation:tIn .25s}
@keyframes tIn{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}

/* SPINNER */
.spin{width:14px;height:14px;border:2px solid var(--bd2);border-top-color:var(--green);border-radius:50%;animation:sp .5s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}

/* EMPTY */
.empty{text-align:center;padding:48px 16px;color:var(--t3)}
.empty p{font-size:11px;margin-top:8px}

/* MODAL */
.mdl-o{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:100}
.mdl{background:var(--bg1);border:1px solid var(--bd2);border-radius:8px;padding:20px;max-width:640px;width:90%;max-height:80vh;overflow-y:auto}

/* RULE ROW */
.rr{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.rr .sel,.rr .inp{flex:1;min-width:0}

/* PAGE-SPECIFIC: Create strategy */
.create-page{max-width:680px;margin:0 auto;padding:20px}
.create-page h2{font-size:14px;font-weight:700;color:var(--t0);margin-bottom:16px;letter-spacing:1px;text-transform:uppercase}
.create-sec{margin-bottom:16px}
.create-sec-t{font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--bd)}

/* Neon accents */
.neon-line{height:1px;background:linear-gradient(90deg,var(--green),transparent);margin:12px 0}
</style>
</head>
