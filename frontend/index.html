<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading System</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-0:#08080c; --bg-1:#0e0e14; --bg-2:#16161e; --bg-3:#1e1e28; --bg-4:#282834;
            --border:#2a2a38; --text-0:#f0f0f4; --text-1:#b8b8c8; --text-2:#78788e;
            --green:#22c55e; --green-dim:#22c55e33; --red:#ef4444; --red-dim:#ef444433;
            --accent:#6366f1; --accent-dim:#6366f133; --yellow:#eab308; --yellow-dim:#eab30833;
            --cyan:#06b6d4; --font-mono:'JetBrains Mono',monospace; --font-sans:'Outfit',sans-serif;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg-0);color:var(--text-0);font-family:var(--font-sans);overflow:hidden;height:100vh}
        ::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-track{background:var(--bg-1)} ::-webkit-scrollbar-thumb{background:var(--bg-4);border-radius:3px}

        .app{display:flex;height:100vh}
        .sidebar{width:56px;background:var(--bg-1);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:4px;flex-shrink:0}
        .sidebar-btn{width:40px;height:40px;border:none;background:transparent;color:var(--text-2);cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .15s}
        .sidebar-btn:hover{background:var(--bg-3);color:var(--text-1)}
        .sidebar-btn.active{background:var(--accent-dim);color:var(--accent)}
        .sidebar-logo{font-family:var(--font-mono);font-size:11px;font-weight:700;color:var(--accent);margin-bottom:16px;letter-spacing:-.5px}

        .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
        .topbar{height:44px;background:var(--bg-1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
        .topbar-title{font-weight:600;font-size:14px;color:var(--text-0)}
        .content{flex:1;overflow-y:auto;padding:16px}

        .sel{background:var(--bg-2);border:1px solid var(--border);color:var(--text-0);padding:6px 10px;border-radius:6px;font-family:var(--font-mono);font-size:12px;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;padding-right:24px}
        .sel option{background:var(--bg-2)}
        .btn{background:var(--bg-3);border:1px solid var(--border);color:var(--text-0);padding:6px 14px;border-radius:6px;font-size:12px;font-family:var(--font-sans);cursor:pointer;transition:all .15s;font-weight:500}
        .btn:hover{background:var(--bg-4);border-color:var(--text-2)}
        .btn-accent{background:var(--accent);border-color:var(--accent);color:#fff}
        .btn-accent:hover{opacity:.85}
        .btn-sm{padding:4px 10px;font-size:11px}
        .card{background:var(--bg-1);border:1px solid var(--border);border-radius:10px;padding:16px}
        .card-header{font-size:12px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
        .stat-value{font-family:var(--font-mono);font-size:22px;font-weight:700}
        .stat-label{font-size:11px;color:var(--text-2);margin-top:2px}
        .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
        .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
        .table{width:100%;border-collapse:collapse;font-size:12px}
        .table th{text-align:left;padding:8px 12px;font-weight:600;color:var(--text-2);border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
        .table td{padding:8px 12px;border-bottom:1px solid var(--border);font-family:var(--font-mono);font-size:12px}
        .table tr:hover td{background:var(--bg-2)}
        .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;font-family:var(--font-mono)}
        .badge-green{background:var(--green-dim);color:var(--green)}
        .badge-red{background:var(--red-dim);color:var(--red)}
        .badge-yellow{background:var(--yellow-dim);color:var(--yellow)}
        .badge-accent{background:var(--accent-dim);color:var(--accent)}
        .pnl-pos{color:var(--green)} .pnl-neg{color:var(--red)}
        .input{background:var(--bg-2);border:1px solid var(--border);color:var(--text-0);padding:8px 10px;border-radius:6px;font-family:var(--font-mono);font-size:12px;outline:none;width:100%}
        .input:focus{border-color:var(--accent)}
        .label{font-size:11px;color:var(--text-2);margin-bottom:4px;font-weight:500}
        .chart-container{width:100%;height:400px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100}
        .modal{background:var(--bg-1);border:1px solid var(--border);border-radius:12px;padding:24px;min-width:480px;max-width:600px;max-height:80vh;overflow-y:auto}
        .modal h3{font-size:16px;margin-bottom:16px}
        .empty-state{text-align:center;padding:60px 20px;color:var(--text-2)}
        .empty-state p{font-size:13px}
        .loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text-2);gap:8px;font-size:13px}
        .spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .rule-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
        .rule-row .sel,.rule-row .input{flex:1}
        .toast{position:fixed;bottom:20px;right:20px;background:var(--bg-3);border:1px solid var(--border);padding:10px 16px;border-radius:8px;font-size:12px;z-index:200;animation:slideUp .3s}
        @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
        .flex{display:flex}.flex-col{flex-direction:column}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
        .items-center{align-items:center}.justify-between{justify-content:space-between}.flex-1{flex:1}
        .mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}.mt-3{margin-top:12px}
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;

const API='/api';
const api={
    get:async(p)=>{const r=await fetch(`${API}${p}`);return r.json()},
    post:async(p,d)=>{const r=await fetch(`${API}${p}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});return r.json()},
    put:async(p,d)=>{const r=await fetch(`${API}${p}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});return r.json()},
    del:async(p)=>{const r=await fetch(`${API}${p}`,{method:'DELETE'});return r.json()},
};

const Icon=({name,size=18})=>{
    const i={
        chart:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>,
        strategy:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>,
        bot:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/></svg>,
        health:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>,
        plus:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
        play:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
        trash:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>,
        refresh:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>,
        x:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
    };
    return i[name]||null;
};

let toastTimer;
function useToast(){
    const[msg,setMsg]=useState(null);
    const show=(t)=>{clearTimeout(toastTimer);setMsg(t);toastTimer=setTimeout(()=>setMsg(null),3000)};
    const Toast=msg?<div className="toast">{msg}</div>:null;
    return{show,Toast};
}

// ── CHART ─────────────────────────────────────────────────────
function ChartPage(){
    const chartRef=useRef(null);const chartObj=useRef(null);
    const[symbols,setSymbols]=useState([]);const[timeframes,setTimeframes]=useState([]);
    const[symbol,setSymbol]=useState('');const[tf,setTf]=useState('');
    const[loading,setLoading]=useState(false);const[count,setCount]=useState(0);

    useEffect(()=>{
        api.get('/symbols').then(d=>{setSymbols(d.symbols||[]);if(d.symbols?.length)setSymbol(d.symbols[0])});
        api.get('/timeframes').then(d=>{setTimeframes(d.timeframes||[]);if(d.timeframes?.length)setTf(d.timeframes[0])});
    },[]);

    useEffect(()=>{
        if(!symbol||!tf||!chartRef.current)return;
        setLoading(true);
        if(chartObj.current){chartObj.current.remove();chartObj.current=null}
        const chart=LightweightCharts.createChart(chartRef.current,{
            layout:{background:{color:'#0e0e14'},textColor:'#78788e',fontFamily:'JetBrains Mono'},
            grid:{vertLines:{color:'#1e1e28'},horzLines:{color:'#1e1e28'}},
            crosshair:{mode:0},rightPriceScale:{borderColor:'#2a2a38'},
            timeScale:{borderColor:'#2a2a38',timeVisible:true},
        });
        chartObj.current=chart;
        const series=chart.addCandlestickSeries({
            upColor:'#22c55e',downColor:'#ef4444',borderUpColor:'#22c55e',borderDownColor:'#ef4444',
            wickUpColor:'#22c55e80',wickDownColor:'#ef444480',
        });
        api.get(`/candles?symbol=${symbol}&timeframe=${tf}&limit=2000`).then(d=>{
            const candles=(d.candles||[]).map(c=>({
                time:Math.floor(new Date(c.time).getTime()/1000),
                open:parseFloat(c.open),high:parseFloat(c.high),low:parseFloat(c.low),close:parseFloat(c.close),
            }));
            series.setData(candles);chart.timeScale().fitContent();setCount(candles.length);setLoading(false);
        });
        const ro=new ResizeObserver(()=>{if(chartRef.current)chart.applyOptions({width:chartRef.current.clientWidth,height:chartRef.current.clientHeight})});
        ro.observe(chartRef.current);
        return()=>{ro.disconnect();chart.remove();chartObj.current=null};
    },[symbol,tf]);

    return(
        <div className="flex flex-col gap-3" style={{height:'100%'}}>
            <div className="flex items-center gap-2">
                <select className="sel" value={symbol} onChange={e=>setSymbol(e.target.value)}>{symbols.map(s=><option key={s} value={s}>{s}</option>)}</select>
                <select className="sel" value={tf} onChange={e=>setTf(e.target.value)}>{timeframes.map(t=><option key={t} value={t}>{t}</option>)}</select>
                <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--text-2)'}}>{count>0&&`${count.toLocaleString()} velas`}</span>
                {loading&&<div className="spinner"/>}
            </div>
            <div ref={chartRef} className="chart-container" style={{flex:1,height:'calc(100% - 50px)'}}/>
        </div>
    );
}

// ── STRATEGIES ────────────────────────────────────────────────
function StrategiesPage(){
    const[strategies,setStrategies]=useState([]);const[showCreate,setShowCreate]=useState(false);
    const[results,setResults]=useState(null);const[trades,setTrades]=useState(null);
    const[selected,setSelected]=useState(null);const[backtesting,setBacktesting]=useState(null);
    const{show,Toast}=useToast();

    const load=()=>api.get('/collections').then(d=>setStrategies(d.strategies||[]));
    useEffect(load,[]);

    const runBacktest=async(id)=>{
        setBacktesting(id);
        const r=await api.post(`/strategies/${id}/backtest`,{});
        setBacktesting(null);
        show(r.result?.error?`Error: ${r.result.error}`:`Backtest OK — PnL: ${r.result?.metrics?.pnl_pct?.toFixed(2)}%`);
        load();
    };
    const deleteStrategy=async(id)=>{await api.del(`/strategies/${id}`);show('Eliminada');load()};
    const viewResults=async(id)=>{setSelected(id);const r=await api.get(`/strategies/${id}/results`);setResults(r.results||[])};
    const viewTrades=async(bid)=>{const r=await api.get(`/backtest/${bid}/trades`);setTrades(r.trades||[])};

    return(
        <div className="flex flex-col gap-4">
            <div className="flex items-center justify-between">
                <span style={{fontSize:13,color:'var(--text-2)'}}>{strategies.length} estrategias</span>
                <div className="flex gap-2">
                    <button className="btn" onClick={load}><Icon name="refresh" size={14}/></button>
                    <button className="btn btn-accent" onClick={()=>setShowCreate(true)}>
                        <span className="flex items-center gap-2"><Icon name="plus" size={14}/> Nueva</span>
                    </button>
                </div>
            </div>
            {strategies.length===0?(
                <div className="empty-state"><Icon name="strategy" size={40}/><p>No hay estrategias. Crea una.</p></div>
            ):(
                <div className="card" style={{padding:0,overflow:'hidden'}}>
                    <table className="table">
                        <thead><tr><th>Nombre</th><th>Par</th><th>TF</th><th>Reglas</th><th>SL/TP</th><th>Estado</th><th>Acciones</th></tr></thead>
                        <tbody>{strategies.map(s=>{
                            const entry=typeof s.entry_rules==='string'?JSON.parse(s.entry_rules):(s.entry_rules||[]);
                            const exit=typeof s.exit_rules==='string'?JSON.parse(s.exit_rules):(s.exit_rules||[]);
                            return(<tr key={s.id}>
                                <td style={{color:'var(--text-0)',fontFamily:'var(--font-sans)',fontWeight:500}}>{s.name}</td>
                                <td>{s.symbol}</td>
                                <td><span className="badge badge-accent">{s.timeframe}</span></td>
                                <td style={{color:'var(--text-2)'}}>{entry.length}E / {exit.length}S</td>
                                <td>{s.stop_loss_pct||'-'}% / {s.take_profit_pct||'-'}%</td>
                                <td>{s.active?<span className="badge badge-green">Activa</span>:<span className="badge badge-yellow">Inactiva</span>}</td>
                                <td><div className="flex gap-2">
                                    <button className="btn btn-sm" onClick={()=>runBacktest(s.id)} disabled={backtesting===s.id}>
                                        {backtesting===s.id?<div className="spinner"/>:<Icon name="play" size={12}/>}
                                    </button>
                                    <button className="btn btn-sm" onClick={()=>viewResults(s.id)}>Results</button>
                                    <button className="btn btn-sm" onClick={()=>deleteStrategy(s.id)} style={{color:'var(--red)'}}><Icon name="trash" size={12}/></button>
                                </div></td>
                            </tr>)
                        })}</tbody>
                    </table>
                </div>
            )}
            {showCreate&&<CreateStrategyModal onClose={()=>{setShowCreate(false);load()}}/>}
            {results&&(
                <div className="modal-overlay" onClick={()=>{setResults(null);setTrades(null);setSelected(null)}}>
                    <div className="modal" onClick={e=>e.stopPropagation()} style={{minWidth:700}}>
                        <div className="flex items-center justify-between mb-4">
                            <h3>Resultados Backtest</h3>
                            <button className="btn btn-sm" onClick={()=>{setResults(null);setTrades(null);setSelected(null)}}><Icon name="x" size={14}/></button>
                        </div>
                        {results.length===0?<p style={{color:'var(--text-2)',fontSize:13}}>Sin resultados. Ejecuta un backtest.</p>:(
                            <>
                            <table className="table">
                                <thead><tr><th>Fecha</th><th>PnL%</th><th>Win Rate</th><th>DD</th><th>Trades</th><th>Sharpe</th><th>PF</th><th></th></tr></thead>
                                <tbody>{results.map(r=>(
                                    <tr key={r.id}>
                                        <td>{new Date(r.created_at).toLocaleDateString()}</td>
                                        <td className={r.pnl_pct>=0?'pnl-pos':'pnl-neg'}>{parseFloat(r.pnl_pct).toFixed(2)}%</td>
                                        <td>{parseFloat(r.win_rate).toFixed(1)}%</td>
                                        <td className="pnl-neg">{parseFloat(r.max_drawdown).toFixed(2)}%</td>
                                        <td>{r.num_trades}</td>
                                        <td>{r.sharpe_ratio?parseFloat(r.sharpe_ratio).toFixed(2):'-'}</td>
                                        <td>{r.profit_factor?parseFloat(r.profit_factor).toFixed(2):'-'}</td>
                                        <td><button className="btn btn-sm" onClick={()=>viewTrades(r.id)}>Trades</button></td>
                                    </tr>
                                ))}</tbody>
                            </table>
                            {trades&&(
                                <div className="mt-3">
                                    <div className="card-header">Trades ({trades.length})</div>
                                    <div style={{maxHeight:300,overflowY:'auto'}}>
                                    <table className="table">
                                        <thead><tr><th>Entrada</th><th>Salida</th><th>Dir</th><th>P.E</th><th>P.S</th><th>PnL%</th><th>Razón</th></tr></thead>
                                        <tbody>{trades.map((t,i)=>(
                                            <tr key={i}>
                                                <td>{new Date(t.entry_time).toLocaleString()}</td>
                                                <td>{t.exit_time?new Date(t.exit_time).toLocaleString():'-'}</td>
                                                <td><span className={`badge ${t.direction==='long'?'badge-green':'badge-red'}`}>{t.direction}</span></td>
                                                <td>${parseFloat(t.entry_price).toFixed(2)}</td>
                                                <td>${t.exit_price?parseFloat(t.exit_price).toFixed(2):'-'}</td>
                                                <td className={t.pnl_pct>=0?'pnl-pos':'pnl-neg'}>{parseFloat(t.pnl_pct).toFixed(2)}%</td>
                                                <td><span className="badge badge-accent">{t.exit_reason}</span></td>
                                            </tr>
                                        ))}</tbody>
                                    </table></div>
                                </div>
                            )}
                            </>
                        )}
                    </div>
                </div>
            )}
            {Toast}
        </div>
    );
}

// ── CREATE STRATEGY MODAL ─────────────────────────────────────
function CreateStrategyModal({onClose}){
    const[symbols,setSymbols]=useState([]);const[timeframes,setTimeframes]=useState([]);
    const[operators,setOperators]=useState([]);const[indicators,setIndicators]=useState([]);
    const[form,setForm]=useState({name:'',symbol:'',timeframe:'',stop_loss_pct:'',take_profit_pct:'',position_size:100});
    const[entryRules,setEntryRules]=useState([{indicator:'',operator:'',value:''}]);
    const[exitRules,setExitRules]=useState([{indicator:'',operator:'',value:''}]);
    const[saving,setSaving]=useState(false);

    useEffect(()=>{
        api.get('/symbols').then(d=>{setSymbols(d.symbols||[]);if(d.symbols?.length)setForm(f=>({...f,symbol:d.symbols[0]}))});
        api.get('/timeframes').then(d=>{setTimeframes(d.timeframes||[]);if(d.timeframes?.length)setForm(f=>({...f,timeframe:d.timeframes[0]}))});
        api.get('/strategies/operators').then(d=>{setOperators(d.operators||[]);setIndicators(d.indicators||[])});
    },[]);

    const save=async()=>{
        if(!form.name)return;setSaving(true);
        await api.post('/strategies',{
            ...form,stop_loss_pct:form.stop_loss_pct?parseFloat(form.stop_loss_pct):null,
            take_profit_pct:form.take_profit_pct?parseFloat(form.take_profit_pct):null,
            position_size:parseFloat(form.position_size),
            entry_rules:entryRules.filter(r=>r.indicator&&r.operator),
            exit_rules:exitRules.filter(r=>r.indicator&&r.operator),
        });
        setSaving(false);onClose();
    };

    const RuleEditor=({rules,setRules,label})=>(
        <div className="mb-3">
            <div className="label">{label}</div>
            {rules.map((r,i)=>(
                <div key={i} className="rule-row">
                    <select className="sel" value={r.indicator} onChange={e=>{const n=[...rules];n[i].indicator=e.target.value;setRules(n)}}>
                        <option value="">Indicador...</option>
                        {indicators.map(ind=><option key={ind.id} value={ind.id}>{ind.label}</option>)}
                    </select>
                    <select className="sel" value={r.operator} onChange={e=>{const n=[...rules];n[i].operator=e.target.value;setRules(n)}}>
                        <option value="">Operador...</option>
                        {operators.map(op=><option key={op.id} value={op.id}>{op.label}</option>)}
                    </select>
                    <input className="input" placeholder="Valor" value={r.value} onChange={e=>{const n=[...rules];n[i].value=e.target.value;setRules(n)}} style={{maxWidth:120}}/>
                    {rules.length>1&&<button className="btn btn-sm" onClick={()=>setRules(rules.filter((_,j)=>j!==i))} style={{color:'var(--red)'}}><Icon name="x" size={12}/></button>}
                </div>
            ))}
            <button className="btn btn-sm mt-3" onClick={()=>setRules([...rules,{indicator:'',operator:'',value:''}])}>
                <span className="flex items-center gap-2"><Icon name="plus" size={12}/> Regla</span>
            </button>
        </div>
    );

    return(
        <div className="modal-overlay" onClick={onClose}>
            <div className="modal" onClick={e=>e.stopPropagation()}>
                <div className="flex items-center justify-between mb-4">
                    <h3>Nueva Estrategia</h3>
                    <button className="btn btn-sm" onClick={onClose}><Icon name="x" size={14}/></button>
                </div>
                <div className="grid-2 mb-3">
                    <div><div className="label">Nombre</div><input className="input" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Mi estrategia"/></div>
                    <div><div className="label">Tamaño posición</div><input className="input" type="number" value={form.position_size} onChange={e=>setForm({...form,position_size:e.target.value})}/></div>
                </div>
                <div className="grid-3 mb-3">
                    <div><div className="label">Par</div><select className="sel" style={{width:'100%'}} value={form.symbol} onChange={e=>setForm({...form,symbol:e.target.value})}>{symbols.map(s=><option key={s}>{s}</option>)}</select></div>
                    <div><div className="label">Timeframe</div><select className="sel" style={{width:'100%'}} value={form.timeframe} onChange={e=>setForm({...form,timeframe:e.target.value})}>{timeframes.map(t=><option key={t}>{t}</option>)}</select></div>
                    <div className="grid-2">
                        <div><div className="label">SL %</div><input className="input" type="number" value={form.stop_loss_pct} onChange={e=>setForm({...form,stop_loss_pct:e.target.value})} placeholder="5"/></div>
                        <div><div className="label">TP %</div><input className="input" type="number" value={form.take_profit_pct} onChange={e=>setForm({...form,take_profit_pct:e.target.value})} placeholder="10"/></div>
                    </div>
                </div>
                <RuleEditor rules={entryRules} setRules={setEntryRules} label="REGLAS DE ENTRADA"/>
                <RuleEditor rules={exitRules} setRules={setExitRules} label="REGLAS DE SALIDA"/>
                <div className="flex justify-between mt-3">
                    <button className="btn" onClick={onClose}>Cancelar</button>
                    <button className="btn btn-accent" onClick={save} disabled={saving}>{saving?'Guardando...':'Crear Estrategia'}</button>
                </div>
            </div>
        </div>
    );
}

// ── BOTS ──────────────────────────────────────────────────────
function BotsPage(){
    const[bots,setBots]=useState([]);const[selectedBot,setSelectedBot]=useState(null);
    const[orders,setOrders]=useState([]);const[stats,setStats]=useState(null);const[loading,setLoading]=useState(true);
    useEffect(()=>{api.get('/bots').then(d=>{setBots(d.bots||[]);setLoading(false)})},[]);
    const viewBot=async(name)=>{
        setSelectedBot(name);
        const[o,s]=await Promise.all([api.get(`/bots/${name}/orders`),api.get(`/bots/${name}/stats`)]);
        setOrders(o.orders||[]);setStats(s.stats||{});
    };
    if(loading)return<div className="loading"><div className="spinner"/>Cargando...</div>;
    return(
        <div className="flex flex-col gap-4">
            {bots.length===0?(
                <div className="empty-state"><Icon name="bot" size={40}/><p>No hay bots. Fase 7 del proyecto.</p></div>
            ):(
                <>
                <div className="grid-3">{bots.map(b=>(
                    <div key={b.name} className="card" style={{cursor:'pointer'}} onClick={()=>viewBot(b.name)}>
                        <div className="flex items-center justify-between mb-3">
                            <span style={{fontWeight:600,fontSize:14}}>{b.name}</span>
                            <span className={`badge ${b.active?'badge-green':'badge-red'}`}>{b.active?'ON':'OFF'}</span>
                        </div>
                        <div style={{fontSize:12,color:'var(--text-2)'}}>{b.symbol} · {b.strategy_id?`Strategy #${b.strategy_id}`:'Sin estrategia'}</div>
                    </div>
                ))}</div>
                {selectedBot&&stats&&(
                    <div className="card">
                        <div className="card-header">{selectedBot} — Stats</div>
                        <div className="grid-4 mb-4">
                            <div><div className="stat-value">{stats.total_orders||0}</div><div className="stat-label">Órdenes</div></div>
                            <div><div className="stat-value pnl-pos">{stats.winning||0}</div><div className="stat-label">Ganadoras</div></div>
                            <div><div className="stat-value pnl-neg">{stats.losing||0}</div><div className="stat-label">Perdedoras</div></div>
                            <div><div className={`stat-value ${(stats.total_pnl||0)>=0?'pnl-pos':'pnl-neg'}`}>${parseFloat(stats.total_pnl||0).toFixed(2)}</div><div className="stat-label">PnL Total</div></div>
                        </div>
                        {orders.length>0&&(
                            <table className="table">
                                <thead><tr><th>Fecha</th><th>Símbolo</th><th>Lado</th><th>Precio</th><th>Cantidad</th><th>PnL</th></tr></thead>
                                <tbody>{orders.slice(0,20).map((o,i)=>(
                                    <tr key={i}>
                                        <td>{new Date(o.created_at).toLocaleString()}</td>
                                        <td>{o.symbol}</td>
                                        <td><span className={`badge ${o.side==='buy'?'badge-green':'badge-red'}`}>{o.side}</span></td>
                                        <td>${parseFloat(o.price||0).toFixed(2)}</td>
                                        <td>{o.amount}</td>
                                        <td className={parseFloat(o.pnl||0)>=0?'pnl-pos':'pnl-neg'}>${parseFloat(o.pnl||0).toFixed(2)}</td>
                                    </tr>
                                ))}</tbody>
                            </table>
                        )}
                    </div>
                )}
                </>
            )}
        </div>
    );
}

// ── HEALTH ────────────────────────────────────────────────────
function HealthPage(){
    const[health,setHealth]=useState(null);const[loading,setLoading]=useState(true);
    const load=()=>{setLoading(true);api.get('/health').then(d=>{setHealth(d);setLoading(false)})};
    useEffect(load,[]);
    return(
        <div className="flex flex-col gap-4">
            <div className="flex items-center justify-between">
                <span style={{fontSize:13,color:'var(--text-2)'}}>Estado del sistema</span>
                <button className="btn" onClick={load}><Icon name="refresh" size={14}/></button>
            </div>
            {loading?<div className="loading"><div className="spinner"/>Consultando...</div>:health&&(
                <>
                <div className="grid-3">
                    <div className="card"><div className="card-header">Estado API</div>
                        <div className="stat-value" style={{color:health.status==='ok'?'var(--green)':'var(--red)'}}>{health.status==='ok'?'● Online':'● Error'}</div>
                    </div>
                    <div className="card"><div className="card-header">Total Velas</div>
                        <div className="stat-value">{(health.total_candles||0).toLocaleString()}</div>
                    </div>
                    <div className="card"><div className="card-header">Base de Datos</div>
                        <div className="stat-value" style={{color:'var(--green)'}}>● Conectada</div>
                    </div>
                </div>
                <div className="card">
                    <div className="card-header">Servicios Docker</div>
                    <div className="grid-4">
                        {['db','fetcher','indicators','backend','nginx'].map(s=>(
                            <div key={s} className="flex items-center gap-2" style={{padding:'8px 0'}}>
                                <span style={{width:8,height:8,borderRadius:'50%',background:'var(--green)',display:'inline-block'}}/>
                                <span style={{fontFamily:'var(--font-mono)',fontSize:12}}>{s}</span>
                            </div>
                        ))}
                    </div>
                </div>
                {health.detail&&(
                    <div className="card"><div className="card-header">Error</div>
                        <pre style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--red)',whiteSpace:'pre-wrap'}}>{health.detail}</pre>
                    </div>
                )}
                </>
            )}
        </div>
    );
}

// ── APP ───────────────────────────────────────────────────────
const PAGES=[
    {id:'chart',icon:'chart',label:'Gráfica',component:ChartPage},
    {id:'strategies',icon:'strategy',label:'Estrategias',component:StrategiesPage},
    {id:'bots',icon:'bot',label:'Bots',component:BotsPage},
    {id:'health',icon:'health',label:'Health',component:HealthPage},
];

function App(){
    const[page,setPage]=useState('chart');
    const current=PAGES.find(p=>p.id===page);const PageComponent=current.component;
    return(
        <div className="app">
            <div className="sidebar">
                <div className="sidebar-logo">TS</div>
                {PAGES.map(p=>(
                    <button key={p.id} className={`sidebar-btn ${page===p.id?'active':''}`} onClick={()=>setPage(p.id)} title={p.label}><Icon name={p.icon}/></button>
                ))}
            </div>
            <div className="main">
                <div className="topbar"><div className="topbar-title">{current.label}</div></div>
                <div className="content"><PageComponent/></div>
            </div>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
