<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading System</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="header">
        <div class="header-logo">trading<span>.</span>system</div>
        <div class="header-status">
            <div class="status-dot"></div>
            <span id="system-status">Conectado</span>
        </div>
    </div>
    <div class="tabs">
        <div class="tab active" data-tab="bots">Bots activos</div>
        <div class="tab" data-tab="analysis">Análisis</div>
        <div class="tab" data-tab="strategies">Estrategias</div>
    </div>
    <div class="content" id="content">
        <div class="loading"><div class="spinner"></div> Cargando...</div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/bots.js"></script>
    <script src="js/analysis.js"></script>
    <script src="js/strategies.js"></script>
    <script>
        // Inicializar tabs
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                renderTab(tab.dataset.tab);
            });
        });
        renderTab('bots');
    </script>
</body>
</html>
